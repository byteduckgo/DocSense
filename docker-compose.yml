version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: docsense-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT_SAMPLING_PERCENTAGE: 100
    networks:
      - docsense

  redis:
    image: redis:7-alpine
    container_name: docsense-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - docsense

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: docsense-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - docsense

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: docsense-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - docsense

  grafana:
    image: grafana/grafana:10.4.0
    container_name: docsense-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    networks:
      - docsense

  loki:
    image: grafana/loki:2.9.0
    container_name: docsense-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yml
      - ./loki_data:/loki
    command:
      - -config.file=/etc/loki/local-config.yml
    networks:
      - docsense

networks:
  docsense:
    driver: bridge
